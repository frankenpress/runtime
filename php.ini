; FrankenPress runtime PHP overrides (Phase 0 spike).
memory_limit = 256M

; Don't emit `X-Powered-By: PHP/<version>`. Removes a free info-leak
; that doesn't help legitimate clients and tells attackers which
; CVEs to throw.
expose_php = Off
upload_max_filesize = 64M
post_max_size = 64M
max_execution_time = 60

; Opcache — required for FrankenPHP worker mode performance.
; JIT is OPT-IN via the `ENABLE_JIT=1` build arg (see Dockerfile) — defaults
; off pending ARM64 stability testing. When enabled, an appended snippet in
; `runtime.ini` flips `opcache.jit = tracing` + `opcache.jit_buffer_size = 64M`.
opcache.enable = 1
opcache.enable_cli = 1
opcache.memory_consumption = 192
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 10000
opcache.revalidate_freq = 2
opcache.validate_timestamps = 1

; Errors go to stderr so the container log captures them.
log_errors = On
error_log = /dev/stderr
display_errors = Off

; Realpath cache speeds up include resolution under worker mode.
realpath_cache_size = 4096K
realpath_cache_ttl = 600
