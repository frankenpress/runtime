name: build

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
  workflow_dispatch:
    inputs:
      fp_mu_plugin_version:
        description: "fp-mu-plugin tag to bake (empty = skip)"
        required: false
        default: ""

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      IMAGE: fp-runtime
      REGISTRY: ghcr.io/eightoeight/fp-runtime

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          set -euo pipefail
          SHORT_SHA="$(git rev-parse --short HEAD)"
          TAGS=()
          # Always tag with the commit SHA for traceability.
          TAGS+=("${REGISTRY}:php8.3-${SHORT_SHA}")
          # On main, also tag as the rolling php8.3 channel.
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            TAGS+=("${REGISTRY}:php8.3")
          fi
          # On a tag push (vX.Y.Z), publish that exact tag.
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VTAG="${GITHUB_REF#refs/tags/}"
            TAGS+=("${REGISTRY}:${VTAG}")
            TAGS+=("${REGISTRY}:php8.3-${VTAG}")
          fi
          # Join with newlines for the docker/build-push-action.
          printf 'tags<<EOF\n%s\nEOF\n' "$(IFS=$'\n'; echo "${TAGS[*]}")" >>"$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >>"$GITHUB_OUTPUT"

      - name: Build (load locally for testing)
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: fp-runtime:test
          build-args: |
            FP_MU_PLUGIN_VERSION=${{ github.event.inputs.fp_mu_plugin_version || '' }}
            SOURCE_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}

      - name: Run cache-spike integration test
        env:
          FP_RUNTIME_IMAGE: fp-runtime:test
        run: |
          docker compose up -d
          # Wait for healthcheck.
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8080/healthz >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          ./tests/cache-spike.sh
          docker compose down -v

      - name: Push (multi-tag)
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            FP_MU_PLUGIN_VERSION=${{ github.event.inputs.fp_mu_plugin_version || '' }}
            SOURCE_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
