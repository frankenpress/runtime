name: build

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
  workflow_dispatch:
    inputs:
      fp_mu_plugin_version:
        description: "mu-plugin tag to bake (empty = skip)"
        required: false
        default: ""

permissions:
  contents: read
  packages: write
  # Required for sigstore keyless OIDC signing in the `merge` job (cosign
  # needs to mint a workflow identity token). Workflow-level so the merge
  # matrix legs all inherit it without per-job repetition.
  id-token: write

env:
  REGISTRY: ghcr.io/frankenpress/runtime
  # The default PHP gets the unprefixed `:v<W.Z>` release tag in addition
  # to its own `:php<X.Y>-v<W.Z>`. Bumping this is a deliberate decision
  # — see .aidocs/php-wp-runtime-matrix.md.
  DEFAULT_PHP: "8.3"

jobs:
  # Build the supported PHP × arch matrix. xcaddy's CGO compile is the
  # bottleneck (~3 min native, ~25 min under QEMU emulation), so each
  # arch gets its own native runner; PHP minors fan out as parallel
  # legs on each. Each leg:
  #   - builds the image and runs the cache-spike integration test
  #     against its own (php, arch) combo
  #   - pushes by digest only (tags are assembled in the per-PHP merge
  #     job)
  #   - uploads its digest as an artifact named
  #     `digest-php<X.Y>-<arch>` for the merge job to consume
  build:
    strategy:
      fail-fast: false
      matrix:
        php: ["8.3", "8.4", "8.5"]
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # FrankenPHP base-image manifest digests for FRANKENPHP_VERSION=1.12.2.
      # Refresh both the table here AND the matching defaults in
      # `Dockerfile` (none — Dockerfile defaults are empty for local-build
      # ergonomics) whenever FRANKENPHP_VERSION bumps. Recipe in CLAUDE.md
      # under "Bumping FRANKENPHP_VERSION".
      - name: Resolve FrankenPHP base-image digests
        id: digests
        run: |
          set -euo pipefail
          case "${{ matrix.php }}" in
            8.3)
              BUILDER="@sha256:e1a497cdca13bfd4a77a3020975e9572eca37e9f6e2ed8dc8f8f1432818fa3e3"
              RUNTIME="@sha256:2312c80fb71a1ed48c62f66d0bda76a243e87c2d6432226b19f11d36b31aeafc"
              ;;
            8.4)
              BUILDER="@sha256:7a46a71a2a36eb4dd42ce6fe0d6f0509a0c110f7313708b3ca56df8320931cfd"
              RUNTIME="@sha256:a3f58635bcf573a8d373630404fb3bbbf72e1434380da699e593788d584f97a9"
              ;;
            8.5)
              BUILDER="@sha256:5399d15c2ca3a5f16f23266164527c10951e393183bd97622e406f7543500eb1"
              RUNTIME="@sha256:da8a979de55fc4a1f1445e043ac1cab275bb85c0cf9f82d7964ad901ed7bad58"
              ;;
            *)
              echo "::error::no digest pinned for PHP ${{ matrix.php }} — refresh the table in build.yml" >&2
              exit 1
              ;;
          esac
          echo "builder=${BUILDER}" >>"$GITHUB_OUTPUT"
          echo "runtime=${RUNTIME}" >>"$GITHUB_OUTPUT"

      - name: Build (load locally for testing)
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: runtime:test
          platforms: ${{ matrix.platform }}
          build-args: |
            PHP_VERSION=${{ matrix.php }}
            FP_MU_PLUGIN_VERSION=${{ github.event.inputs.fp_mu_plugin_version || '' }}
            SOURCE_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
            IMAGE_VERSION=${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || github.sha }}
            FRANKENPHP_BUILDER_DIGEST=${{ steps.digests.outputs.builder }}
            FRANKENPHP_RUNTIME_DIGEST=${{ steps.digests.outputs.runtime }}

      - name: Run cache-spike integration test
        env:
          FP_RUNTIME_IMAGE: runtime:test
        run: |
          docker compose up -d
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8080/healthz >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          ./tests/cache-spike.sh
          docker compose down -v

      - name: Push by digest
        if: github.event_name != 'pull_request'
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: ${{ matrix.platform }}
          # Push without tags; only the manifest digest is recorded.
          # The per-PHP merge job stitches arch digests into a manifest
          # list under the real tags.
          outputs: type=image,name=${{ env.REGISTRY }},push-by-digest=true,name-canonical=true,push=true
          build-args: |
            PHP_VERSION=${{ matrix.php }}
            FP_MU_PLUGIN_VERSION=${{ github.event.inputs.fp_mu_plugin_version || '' }}
            SOURCE_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
            IMAGE_VERSION=${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || github.sha }}
            FRANKENPHP_BUILDER_DIGEST=${{ steps.digests.outputs.builder }}
            FRANKENPHP_RUNTIME_DIGEST=${{ steps.digests.outputs.runtime }}
          cache-from: type=gha,scope=php${{ matrix.php }}-${{ matrix.arch }}
          cache-to: type=gha,scope=php${{ matrix.php }}-${{ matrix.arch }},mode=max

      - name: Stash digest as artifact
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          mkdir -p /tmp/digests
          digest="${{ steps.push.outputs.digest }}"
          # Filename is the bare hex (no `sha256:` prefix); the merge job
          # re-prepends `sha256:` when assembling the imagetools args.
          touch "/tmp/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@v4
        if: github.event_name != 'pull_request'
        with:
          name: digest-php${{ matrix.php }}-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Single rollup check that succeeds iff the entire `build` matrix
  # succeeded. Branch protection requires this one stable name instead
  # of every matrix leg — bumping the PHP/arch matrix no longer requires
  # editing the ruleset.
  gate:
    if: always()
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Verify build matrix
        run: |
          result="${{ needs.build.result }}"
          if [[ "$result" != "success" ]]; then
            echo "::error::build matrix did not succeed (result=$result)"
            exit 1
          fi
          echo "all build matrix legs passed"

  merge:
    if: github.event_name != 'pull_request'
    needs: build
    strategy:
      fail-fast: false
      matrix:
        php: ["8.3", "8.4", "8.5"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download arch digests for this PHP
        uses: actions/download-artifact@v4
        with:
          pattern: digest-php${{ matrix.php }}-*
          path: /tmp/digests
          merge-multiple: true

      - name: Compute image tags
        id: tags
        run: |
          set -euo pipefail
          SHORT_SHA="$(git rev-parse --short HEAD)"
          PHP="${{ matrix.php }}"
          TAGS=()
          TAGS+=("${REGISTRY}:php${PHP}-${SHORT_SHA}")
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            TAGS+=("${REGISTRY}:php${PHP}")
          fi
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VTAG="${GITHUB_REF#refs/tags/}"
            TAGS+=("${REGISTRY}:php${PHP}-${VTAG}")
            # The unprefixed `:v<W.Z>` channel only goes to the default
            # PHP — it's the "I don't care which PHP, give me the
            # blessed one for this release" tag.
            if [ "${PHP}" = "${DEFAULT_PHP}" ]; then
              TAGS+=("${REGISTRY}:${VTAG}")
            fi
          fi
          TAG_ARGS=$(printf -- ' -t %s' "${TAGS[@]}")
          echo "tag_args=${TAG_ARGS}" >>"$GITHUB_OUTPUT"
          # Expose the first tag separately so the next step can inspect
          # the just-pushed manifest list to recover its digest (all the
          # tags we publish point at the same manifest, so any one works).
          echo "first_tag=${TAGS[0]}" >>"$GITHUB_OUTPUT"

      - name: Create + push manifest list
        id: manifest
        run: |
          set -euo pipefail
          # Reassemble `<registry>@sha256:<hex>` refs from the digest
          # artifact filenames stashed by the build job.
          DIGEST_REFS=()
          for f in /tmp/digests/*; do
            DIGEST_REFS+=("${REGISTRY}@sha256:$(basename "$f")")
          done
          docker buildx imagetools create \
            ${{ steps.tags.outputs.tag_args }} \
            "${DIGEST_REFS[@]}"
          # Capture the manifest-list digest of what we just pushed, so
          # the SBOM + cosign steps below can pin to a stable, immutable
          # ref instead of a moving tag.
          MANIFEST_DIGEST=$(docker buildx imagetools inspect "${{ steps.tags.outputs.first_tag }}" --format '{{.Manifest.Digest}}')
          echo "ref=${REGISTRY}@${MANIFEST_DIGEST}" >>"$GITHUB_OUTPUT"

      # Generate an SPDX SBOM of the published manifest list and attach
      # it to the image digest via `cosign attest`. Combined with the
      # cosign signature in the next step, consumers can audit provenance:
      #   cosign tree   ghcr.io/frankenpress/runtime:php8.3
      #   cosign verify ghcr.io/frankenpress/runtime:php8.3 \
      #     --certificate-identity-regexp '^https://github.com/frankenpress/runtime/' \
      #     --certificate-oidc-issuer https://token.actions.githubusercontent.com
      #
      # Note: syft scans whichever platform the runner pulls (linux/amd64
      # by default on ubuntu-latest), so the attested SBOM is the amd64
      # surface — accurate for the dominant pull path. Per-arch SBOMs
      # would mean scanning + attesting per (php, arch) leg in the build
      # job; deferred until a real consumer asks for it.
      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.manifest.outputs.ref }}
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: false

      - uses: sigstore/cosign-installer@v3

      - name: Sign + attest SBOM (keyless OIDC)
        env:
          IMAGE_REF: ${{ steps.manifest.outputs.ref }}
        run: |
          set -euo pipefail
          cosign sign --yes "$IMAGE_REF"
          cosign attest --yes --predicate sbom.spdx.json --type spdxjson "$IMAGE_REF"
