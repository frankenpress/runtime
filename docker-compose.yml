# FrankenPress runtime — Phase 0 spike harness.
#
# Brings up the runtime container + Redis (Souin backend).
# Run with:
#   docker compose up --build
# Then exercise the cache:
#   ./tests/cache-spike.sh

services:
  runtime:
    build: .
    image: fp-runtime:spike
    ports:
      - "8080:8080"   # http
      - "9145:9145"   # metrics
    environment:
      REDIS_URL: redis:6379
      SERVER_NAME: ":8080"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 2s
      retries: 5
