# FrankenPress runtime — local dev + CI harness.
#
# Brings up the runtime container + Redis (Souin's HTTP cache backend).
#
# Local dev:
#   docker compose up --build           # builds the image as fp-runtime:dev
#   ./tests/cache-spike.sh              # exercises the cache
#
# CI / re-using a pre-built image:
#   docker build -t fp-runtime:test .
#   FP_RUNTIME_IMAGE=fp-runtime:test docker compose up -d
#   ./tests/cache-spike.sh
#
# Override env vars to tune the cache or change ports — see the Caddyfile
# header for the full list.

services:
  runtime:
    build: .
    image: ${FP_RUNTIME_IMAGE:-fp-runtime:dev}
    ports:
      - "8080:8080"   # http
      - "9145:9145"   # metrics
    environment:
      REDIS_URL: redis:6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 2s
      retries: 5
